spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/notifications_db
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect


  mail:
    host: smtp.ethereal.email
    port: 587

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-notification.yaml

  eureka:
    client:
      registry-fetch-interval-seconds: 30
      service-url:
        defaultZone: http://localhost:8761/eureka/
      fetch-registry: true
      register-with-eureka: true
    instance:
      prefer-ip-address: true

  cloud:
    loadbalancer:
      cache:
        enabled: true

server:
  port: 8083

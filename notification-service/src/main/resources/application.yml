spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/notifications_db
    username: admin
    password: hardpassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect


  mail:
    host: smtp.ethereal.email
    port: 587

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-notification.yaml
